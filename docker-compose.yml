# NovaPanel Docker Compose — Hardened
#
# Network topology:
#   internet → :8080 → api
#   db-net (internal):  postgres ← redis ← api ← automation
#   app-net:            api ↔ automation  (outbound internet allowed for Cloudflare, Let's Encrypt, etc.)
#   socket-net:         api ↔ docker-socket-proxy  (restricted Docker API)
#
# Only port 8080 is exposed. Databases are never reachable from the internet.

networks:
  db-net:
    driver: bridge
    internal: true        # no route to the internet — databases are fully isolated
  app-net:
    driver: bridge        # outbound internet allowed (Cloudflare API, SSH, certbot etc.)
  socket-net:
    driver: bridge
    internal: true        # proxy ↔ api only — no internet access

services:

  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: novapanel-db
    restart: unless-stopped
    networks:
      - db-net
    environment:
      POSTGRES_DB: ${DB_NAME:-novapanel}
      POSTGRES_USER: ${DB_USER:-novapanel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-novapanel_secret}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Hardening
    read_only: true
    tmpfs:
      - /tmp:mode=1777
      - /var/run/postgresql:mode=0775,uid=70,gid=70
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-novapanel} -d ${DB_NAME:-novapanel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # Redis  (password-protected + dangerous commands disabled)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: novapanel-redis
    restart: unless-stopped
    networks:
      - db-net
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-novapanel_redis_secret}
      --bind 0.0.0.0
      --protected-mode yes
      --rename-command FLUSHALL  ""
      --rename-command FLUSHDB   ""
      --rename-command DEBUG     ""
      --rename-command SLAVEOF   ""
      --rename-command REPLICAOF ""
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    # Hardening
    read_only: true
    tmpfs:
      - /tmp:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-novapanel_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ─────────────────────────────────────────────
  # Docker Socket Proxy  (restricts which Docker API calls the api container can make)
  # ─────────────────────────────────────────────
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: novapanel-docker-proxy
    restart: unless-stopped
    networks:
      - socket-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Read access
      CONTAINERS: 1
      IMAGES: 1
      VOLUMES: 1
      NETWORKS: 1
      INFO: 1
      PING: 1
      EVENTS: 1
      SERVICES: 1
      TASKS: 1
      # Write access (needed for container management features)
      POST: 1
      BUILD: 1
      # Deny dangerous operations
      AUTH: 0
      SECRETS: 0
      SWARM: 0
      NODES: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      SESSION: 0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  # ─────────────────────────────────────────────
  # API (Go backend + React frontend)
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: novapanel-api
    restart: unless-stopped
    networks:
      - db-net       # reach postgres + redis
      - app-net      # outbound internet (Cloudflare, SSH to managed servers, etc.)
      - socket-net   # reach docker-proxy (not the raw socket)
    ports:
      - "0.0.0.0:8080:8080"  # only public-facing port
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-novapanel}
      - DB_USER=${DB_USER:-novapanel}
      - DB_PASSWORD=${DB_PASSWORD:-novapanel_secret}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-novapanel_redis_secret}@redis:6379
      - DOCKER_HOST=tcp://docker-proxy:2375   # use proxy, not raw socket
      - JWT_SECRET=${JWT_SECRET:-novapanel-dev-secret-change-in-production}
      - ENV=${ENV:-development}
      - SSH_USER=${SSH_USER:-erp}
      - SSH_PASSWORD=${SSH_PASSWORD:-}
      - HOST_USER=${HOST_USER:-erp}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8080}
      - AUTOMATION_URL=http://automation:8001
    volumes:
      # Host config mounts — read-only for service discovery
      - /etc/nginx:/host/nginx:ro
      - /etc/apache2:/host/apache2:ro
      - /etc/httpd:/host/httpd:ro
      - /etc/systemd/system:/host/systemd/system:ro
      - /lib/systemd/system:/host/systemd/lib:ro
      - /etc/init.d:/host/init.d:ro
      - /home/${HOST_USER:-erp}/.ssh:/host/ssh:ro
      - /var/run/dbus:/var/run/dbus:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          memory: 128M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ─────────────────────────────────────────────
  # Automation (Python FastAPI)
  # ─────────────────────────────────────────────
  automation:
    build:
      context: ./automation
      dockerfile: Dockerfile
    container_name: novapanel-automation
    restart: unless-stopped
    networks:
      - db-net     # reach postgres + redis
      - app-net    # communicate with api + outbound internet
    expose:
      - "8001"     # internal only, not published to host
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-novapanel}
      - DB_USER=${DB_USER:-novapanel}
      - DB_PASSWORD=${DB_PASSWORD:-novapanel_secret}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-novapanel_redis_secret}@redis:6379
      - API_URL=http://api:8080
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 64M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
